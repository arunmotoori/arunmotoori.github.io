<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Anime 3D Prints Store</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }

    body { background: #0f172a; color: #fff; }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 50px;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(10px);
      position: sticky;
      top: 0;
    }

    header h1 { color: #f43f5e; }

    nav a {
      margin-left: 20px;
      text-decoration: none;
      color: #fff;
      transition: 0.3s;
    }

    nav a:hover { color: #f43f5e; }

    .hero {
      height: 90vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      background: linear-gradient(to right, #020617, #1e293b);
    }

    .hero h2 { font-size: 3rem; margin-bottom: 20px; }

    .hero p { margin-bottom: 20px; color: #cbd5f5; }

    .btn {
      padding: 12px 25px;
      border: none;
      background: #f43f5e;
      color: white;
      border-radius: 30px;
      cursor: pointer;
      transition: 0.3s;
    }

    .btn:hover { background: #be123c; }

    .products {
      padding: 60px 50px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 30px;
    }

    .card {
      background: #1e293b;
      padding: 20px;
      border-radius: 20px;
      text-align: center;
      transition: 0.3s;
    }

    .card:hover { transform: translateY(-10px); }

    .card img {
      width: 100%;
      border-radius: 15px;
    }

    .card h3 { margin: 15px 0; }

    footer {
      text-align: center;
      padding: 20px;
      background: #020617;
      margin-top: 40px;
    }

  </style>
</head>
<body>

<header>
  <h1>Anime3D</h1>
  <nav>
    <a href="#">Home</a>
    <a href="#">Shop</a>
    <a href="#">About</a>
    <a href="#">Contact</a>
  </nav>
</header>

<section class="hero">
  <div>
    <h2>Premium 3D Printed Anime Figures</h2>
    <p>Bring your favorite characters to life with high-quality 3D prints</p>
    <button class="btn">Shop Now</button>
  </div>
</section>

<section class="products">
  <div class="card">
    <img src="https://via.placeholder.com/300" alt="Anime Figure">
    <h3>Naruto Figure</h3>
    <p>$25</p>
    <button class="btn">Buy</button>
  </div>

  <div class="card">
    <img src="https://via.placeholder.com/300" alt="Anime Figure">
    <h3>Goku Figure</h3>
    <p>$30</p>
    <button class="btn">Buy</button>
  </div>

  <div class="card">
    <img src="https://via.placeholder.com/300" alt="Anime Figure">
    <h3>Levi Ackerman</h3>
    <p>$28</p>
    <button class="btn">Buy</button>
  </div>
</section>

<footer>
  <p>© 2026 Anime3D Store. All rights reserved.</p>
</footer>

</body>
</html>
